name: Build and Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get secrets from Secret Manager
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            FIREBASE_API_KEY:skyfitpro-b293c/FIREBASE_API_KEY
            FIREBASE_APP_ID:skyfitpro-b293c/FIREBASE_APP_ID
            FIREBASE_AUTH_DOMAIN:skyfitpro-b293c/FIREBASE_AUTH_DOMAIN
            FIREBASE_PROJECT_ID:skyfitpro-b293c/FIREBASE_PROJECT_ID
            FIREBASE_STORAGE_BUCKET:skyfitpro-b293c/FIREBASE_STORAGE_BUCKET
            FIREBASE_MESSAGING_SENDER_ID:skyfitpro-b293c/FIREBASE_MESSAGING_SENDER_ID
            OPENWEATHER_API_KEY:skyfitpro-b293c/OPENWEATHER_API_KEY

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Web
        run: |
          flutter build web \
            --dart-define=FIREBASE_API_KEY=${{ steps.secrets.outputs.FIREBASE_API_KEY }} \
            --dart-define=FIREBASE_AUTH_DOMAIN=${{ steps.secrets.outputs.FIREBASE_AUTH_DOMAIN }} \
            --dart-define=FIREBASE_PROJECT_ID=${{ steps.secrets.outputs.FIREBASE_PROJECT_ID }} \
            --dart-define=FIREBASE_STORAGE_BUCKET=${{ steps.secrets.outputs.FIREBASE_STORAGE_BUCKET }} \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID=${{ steps.secrets.outputs.FIREBASE_MESSAGING_SENDER_ID }} \
            --dart-define=FIREBASE_APP_ID=${{ steps.secrets.outputs.FIREBASE_APP_ID }} \
            --dart-define=OPENWEATHER_API_KEY=${{ steps.secrets.outputs.OPENWEATHER_API_KEY }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: skyfit-pro
          region: asia-southeast1
          source: .
          project_id: skyfitpro-b293c
